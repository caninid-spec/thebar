<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categoria — The Bar</title>
    <link rel="stylesheet" href="core.css">
    <link rel="stylesheet" href="components.css">
    <link rel="stylesheet" href="category-style.css">
    <script src="cocktails-data.js"></script>
    <script src="search-filter.js"></script>
</head>
<body>

<div class="container">

    <!-- Nav -->
    <nav class="cat-nav">
        <a href="index.html" class="back-link">← The Bar</a>
    </nav>

    <!-- Header categoria -->
    <header class="cat-header">
        <div class="cat-emoji" id="cat-emoji">🍸</div>
        <h1 class="cat-title" id="cat-title">Categoria</h1>
        <p class="cat-subtitle" id="cat-subtitle"></p>
        <div class="cat-count" id="cat-count"></div>
    </header>

    <!-- Lista ricette -->
    <main>
        <div id="recipes-container"></div>
    </main>

    <footer>
        <p>The Bar · <a href="index.html">← Home</a></p>
    </footer>

</div>

<script>
(function () {

    /* ── Config categorie ── */
    const CATEGORIES = {
        'cocktail-unforgettables': {
            title: 'The Unforgettables',
            emoji: '✨',
            subtitle: 'I 35 grandi classici IBA. Il cuore della storia del cocktail.',
            list: () => IBA_UNFORGETTABLES
        },
        'cocktail-contemporary': {
            title: 'The Contemporary Classics',
            emoji: '🍸',
            subtitle: 'I classici moderni entrati nell\'olimpo IBA tra gli anni \'70 e \'90.',
            list: () => IBA_CONTEMPORARY
        },
        'cocktail-new-era': {
            title: 'The New Era Drinks',
            emoji: '🚀',
            subtitle: 'I cocktail del XXI secolo: creativi, audaci, già iconici.',
            list: () => IBA_NEW_ERA
        },
        'cocktail-aperitivi': {
            title: 'Aperitivi',
            emoji: '🥂',
            subtitle: 'Leggeri, vivaci e invitanti. Per aprire la serata nel modo giusto.',
            list: () => NOMAD_APERITIVI
        },
        'cocktail-light': {
            title: 'Light Spirited',
            emoji: '🌿',
            subtitle: 'Cocktail delicati e rinfrescanti, a bassa gradazione alcolica.',
            list: () => NOMAD_LIGHT
        },
        'cocktail-dark': {
            title: 'Dark Spirited',
            emoji: '🌑',
            subtitle: 'Distillati scuri, profondità e carattere. Per i palati più esigenti.',
            list: () => NOMAD_DARK
        },
        'cocktail-classics': {
            title: 'Classics',
            emoji: '🏛️',
            subtitle: 'La selezione Nomad dei grandi classici senza tempo.',
            list: () => NOMAD_CLASSICS
        },
        'cocktail-soft': {
            title: 'Soft Cocktails',
            emoji: '🌱',
            subtitle: 'Senza alcol, ma senza compromessi sul gusto.',
            list: () => NOMAD_SOFT
        },
        'cocktail-basics': {
            title: 'Basics',
            emoji: '🧪',
            subtitle: 'Sciroppi, cordiali e preparazioni base da avere sempre pronti.',
            list: () => NOMAD_BASICS
        }
    };

    /* ── Determina categoria dalla pagina ── */
    const pageName = location.pathname.split('/').pop().replace('.html', '');
    const catKey = Object.keys(CATEGORIES).find(k => k === pageName) || Object.keys(CATEGORIES)[0];
    const cat = CATEGORIES[catKey];

    /* ── Imposta header ── */
    document.title = `${cat.title} — The Bar`;
    document.getElementById('cat-emoji').textContent = cat.emoji;
    document.getElementById('cat-title').textContent = cat.title;
    document.getElementById('cat-subtitle').textContent = cat.subtitle;

    /* ── Highlight da URL ── */
    const urlParams = new URLSearchParams(location.search);
    const highlight = urlParams.get('highlight');

    /* ── Render ricette ── */
    const list = cat.list();
    const countEl = document.getElementById('cat-count');
    countEl.textContent = `${list.length} cocktail`;

    const GLASS_EMOJI = {
        coupe: '🍷', rocks: '🥃', highball: '🥤', flute: '🥂',
        martini: '🍸', 'nick&nora': '🍸', hurricane: '🌀', mule: '🍺',
        wine: '🍷', shot: '🥃', champagne: '🥂', none: ''
    };
    const SERVE_LABEL = { stirred:'Mescolato', shaken:'Shakeraro', built:'Costruito', blended:'Frullato' };

    function renderRecipeCard(c) {
        const hasIBA = c.recipeIBA || (c.recipe && c.iba);
        const hasDifford = c.recipeDifford || (c.recipe && c.difford);
        const hasDouble = c.recipeIBA && c.recipeDifford;

        const recipe = c.recipeIBA || c.recipeDifford || c.recipe;
        const serveLine = recipe ? recipe.ingredients.slice(0, 4).map(i => `<span>${i.amount} ${i.item}</span>`).join(' · ') : '';

        const badges = [];
        if (c.iba) badges.push('<span class="badge badge--iba">IBA</span>');
        if (c.difford && !c.iba) badges.push('<span class="badge badge--difford">Difford\'s</span>');
        if (hasDouble) badges.push('<span class="badge badge--double">2 versioni</span>');

        return `
        <article class="recipe-card ${highlight === c.id ? 'recipe-card--highlight' : ''}"
                 data-category="${c.ibaCategory||''} ${c.nomadCategory||''}"
                 id="card-${c.id}">
            <div class="recipe-toggle" role="button" tabindex="0" aria-expanded="false">
                <div class="recipe-toggle-left">
                    <span class="recipe-emoji">${c.emoji}</span>
                    <div class="recipe-toggle-info">
                        <h3>${c.name}</h3>
                        <p class="recipe-tagline">${c.tagline}</p>
                    </div>
                </div>
                <div class="recipe-toggle-right">
                    <div class="recipe-badges">${badges.join('')}</div>
                    <span class="toggle-icon">▼</span>
                </div>
            </div>

            <div class="recipe-body">
                <!-- Specs rapide -->
                <div class="quick-specs">
                    ${c.glass && c.glass !== 'none' ? `<span class="qs-item">${GLASS_EMOJI[c.glass]||''} ${c.glass}</span>` : ''}
                    ${c.serve ? `<span class="qs-item">⚗️ ${SERVE_LABEL[c.serve]||c.serve}</span>` : ''}
                    ${c.ice && c.ice !== 'none' ? `<span class="qs-item">🧊 ${c.ice}</span>` : ''}
                    ${c.garnish && c.garnish !== 'Nessuno' ? `<span class="qs-item">🌿 ${c.garnish}</span>` : ''}
                </div>

                <!-- Ingredienti (prima versione o unica) -->
                ${renderIngredientsList(c)}

                <!-- Metodo -->
                ${recipe ? `
                <div class="body-method">
                    <span class="method-mini-label">Metodo</span>
                    <p>${recipe.method}</p>
                    ${recipe.notes ? `<p class="method-notes">💡 ${recipe.notes}</p>` : ''}
                </div>` : ''}

                <!-- Link a pagina completa (con doppia versione) -->
                ${hasDouble ? `
                <div class="double-version-hint">
                    <a href="cocktail-recipe.html?id=${c.id}" class="btn btn--ghost">
                        📖 Vedi entrambe le versioni IBA & Difford's →
                    </a>
                </div>` : `
                <div class="recipe-full-link">
                    <a href="cocktail-recipe.html?id=${c.id}" class="btn btn--ghost">Scheda completa →</a>
                </div>`}

                ${c.description ? `<p class="recipe-desc">${c.description}</p>` : ''}
            </div>
        </article>`;
    }

    function renderIngredientsList(c) {
        const recipe = c.recipeIBA || c.recipeDifford || c.recipe;
        if (!recipe || !recipe.ingredients) return '';
        const label = c.recipeIBA ? '✨ IBA' : (c.recipeDifford ? "📖 Difford's" : '');
        return `
        <div class="body-ingredients">
            ${label ? `<div class="ing-version-label">${label}</div>` : ''}
            ${recipe.ingredients.map(i => `
            <div class="ing-row">
                <span class="ing-amount">${i.amount}</span>
                <span class="ing-item">${i.item}</span>
            </div>`).join('')}
        </div>`;
    }

    const container = document.getElementById('recipes-container');
    if (!list || list.length === 0) {
        container.innerHTML = '<p class="empty-section">Nessuna ricetta in questa categoria.</p>';
    } else {
        container.innerHTML = list.map(renderRecipeCard).join('');
    }

    /* ── Toggle apertura card ── */
    document.querySelectorAll('.recipe-toggle').forEach(toggle => {
        const open = () => {
            const card = toggle.closest('.recipe-card');
            const isOpen = card.classList.toggle('open');
            toggle.setAttribute('aria-expanded', isOpen);
            const icon = toggle.querySelector('.toggle-icon');
            if (icon) icon.textContent = isOpen ? '▲' : '▼';
        };
        toggle.addEventListener('click', open);
        toggle.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); open(); } });
    });

    /* ── Auto-apri highlight ── */
    if (highlight) {
        const card = document.getElementById('card-' + highlight);
        if (card) {
            card.classList.add('open');
            const icon = card.querySelector('.toggle-icon');
            if (icon) icon.textContent = '▲';
            setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'start' }), 300);
        }
    }

})();
</script>

</body>
</html>
