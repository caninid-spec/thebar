<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Cocktails — The Bar</title>
    <link rel="stylesheet" href="core.css">
    <link rel="stylesheet" href="components.css">
    <link rel="stylesheet" href="category-style.css">
    <link rel="stylesheet" href="all-style.css">
    <script src="config.js"></script>
    <script src="search-filter.js"></script>
</head>
<body>

<nav class="hub-nav">
    <a href="index.html" class="back-link">← The Bar</a>
</nav>

<header class="page-header">
    <div class="page-header__icon">📖</div>
    <h1 class="page-header__title">All Cocktails</h1>
    <p class="page-header__subtitle">IBA · Difford's Guide · Nomad Cocktail Book</p>
    <div class="page-header__meta" id="cat-count"></div>
</header>

<div class="container" style="padding: 28px 20px 60px;">

    <!-- Filter bar — le pill per categoria vengono generate da TheBarConfig.CATEGORY_PAGES -->
    <div class="all-filter-bar" id="filter-bar">
        <button class="filter-pill active" data-filter="all">Tutti</button>
        <button class="filter-pill" data-filter="iba">IBA</button>
        <button class="filter-pill" data-filter="difford">Difford's</button>
    </div>

    <main>
        <div id="recipes-container"></div>
    </main>

</div>

<footer>
    <p>The Bar · <a href="index.html">← Home</a></p>
</footer>

<script>
(function () {

    const { GLASS_EMOJI, SERVE_LABEL, CATEGORY_PAGES } = TheBarConfig;
    const container = document.getElementById('recipes-container');
    const countEl   = document.getElementById('cat-count');
    const filterBar = document.getElementById('filter-bar');

    /* ── Genera pill categoria dinamicamente da CATEGORY_PAGES ── */
    Object.entries(CATEGORY_PAGES).forEach(([key, cat]) => {
        const btn = document.createElement('button');
        btn.className = 'filter-pill';
        btn.dataset.filter = key;
        btn.textContent = cat.filterLabel || cat.label;
        filterBar.appendChild(btn);
    });

    /* ── Spinner ── */
    TheBarConfig.showLoader('recipes-container');

    /* ── Helpers render ── */
    function renderIngredientsList(c) {
        const recipe = c.recipeIBA || c.recipeDifford || c.recipe;
        if (!recipe || !recipe.ingredients) return '';
        const label = c.recipeIBA ? '✨ IBA' : (c.recipeDifford ? "📖 Difford's" : '');
        return `
        <div class="body-ingredients">
            ${label ? `<div class="ing-version-label">${label}</div>` : ''}
            ${recipe.ingredients.map(i => `
            <div class="ing-row">
                <span class="ing-amount">${i.amount}</span>
                <span class="ing-item">${i.item}</span>
            </div>`).join('')}
        </div>`;
    }

    function renderRecipeCard(c) {
        const hasDouble = c.recipeIBA && c.recipeDifford;
        const recipe    = c.recipeIBA || c.recipeDifford || c.recipe;

        const badges = [];
        if (c.iba)               badges.push('<span class="badge badge--iba">IBA</span>');
        if (c.difford && !c.iba) badges.push('<span class="badge badge--difford">Difford\'s</span>');
        if (hasDouble)           badges.push('<span class="badge badge--double">2 versioni</span>');

        // Label categoria lette da CATEGORY_PAGES — nessun oggetto hardcoded
        const cats = [c.ibaCategory, c.nomadCategory].filter(Boolean);
        const catBadges = cats
            .map(k => CATEGORY_PAGES[k]?.filterLabel || k)
            .map(label => `<span class="badge badge--category">${label}</span>`)
            .join('');

        return `
        <article class="recipe-card"
                 data-iba="${c.iba}"
                 data-difford="${c.difford}"
                 data-iba-cat="${c.ibaCategory || ''}"
                 data-nomad-cat="${c.nomadCategory || ''}">
            <button class="recipe-toggle" type="button" aria-expanded="false">
                <div class="recipe-toggle-left">
                    <div class="recipe-toggle-info">
                        <h3>${c.name}</h3>
                        <p class="recipe-tagline">${c.tagline}</p>
                    </div>
                </div>
                <div class="recipe-toggle-right">
                    <div class="recipe-badges">${badges.join('')}${catBadges}</div>
                    <span class="toggle-icon">▼</span>
                </div>
            </button>
            <div class="recipe-body">
                <div class="quick-specs">
                    ${c.glass && c.glass !== 'none' ? `<span class="qs-item">${GLASS_EMOJI[c.glass] || ''} ${c.glass}</span>` : ''}
                    ${c.serve ? `<span class="qs-item">⚗️ ${SERVE_LABEL[c.serve] || c.serve}</span>` : ''}
                    ${c.ice && c.ice !== 'none' ? `<span class="qs-item">🧊 ${c.ice}</span>` : ''}
                    ${c.garnish && c.garnish !== 'Nessuno' ? `<span class="qs-item">🌿 ${c.garnish}</span>` : ''}
                </div>
                ${renderIngredientsList(c)}
                ${recipe ? `
                <div class="body-method">
                    <span class="method-mini-label">Metodo</span>
                    <p>${recipe.method}</p>
                    ${recipe.notes ? `<p class="method-notes">💡 ${recipe.notes}</p>` : ''}
                </div>` : ''}
                ${hasDouble ? `
                <div class="double-version-hint">
                    <a href="cocktail-recipe.html?id=${c.id}&from=all" class="btn btn--ghost">
                        📖 Vedi entrambe le versioni IBA & Difford's →
                    </a>
                </div>` : `
                <div class="recipe-full-link">
                    <a href="cocktail-recipe.html?id=${c.id}&from=all" class="btn btn--ghost">Scheda completa →</a>
                </div>`}
                ${c.description ? `<p class="recipe-desc">${c.description}</p>` : ''}
            </div>
        </article>`;
    }

    /* ── Caricamento asincrono ── */
    TheBarConfig.loadCocktails().then(cocktails => {

        container.innerHTML = cocktails.map(renderRecipeCard).join('');
        countEl.textContent = cocktails.length + ' cocktail';

        /* ── Toggle card ── */
        container.querySelectorAll('.recipe-toggle').forEach(toggle => {
            const open = () => {
                const card   = toggle.closest('.recipe-card');
                const isOpen = card.classList.toggle('open');
                toggle.setAttribute('aria-expanded', isOpen);
                const icon = toggle.querySelector('.toggle-icon');
                if (icon) icon.textContent = isOpen ? '▲' : '▼';
            };
            toggle.addEventListener('click', open);
            toggle.addEventListener('keydown', e => {
                if (e.key === ' ') { e.preventDefault(); open(); }
            });
        });

        /* ── Filter pills ── */
        filterBar.querySelectorAll('.filter-pill').forEach(pill => {
            pill.addEventListener('click', () => {
                filterBar.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
                pill.classList.add('active');

                const f = pill.dataset.filter;
                const cards = container.querySelectorAll('article.recipe-card');
                let visible = 0;

                cards.forEach(card => {
                    let show = false;
                    if      (f === 'all')    show = true;
                    else if (f === 'iba')    show = card.dataset.iba === 'true';
                    else if (f === 'difford') show = card.dataset.difford === 'true';
                    else                    show = card.dataset.ibaCat === f || card.dataset.nomadCat === f;

                    card.style.display = show ? '' : 'none';
                    if (show) visible++;
                });

                countEl.textContent = visible + ' cocktail';
            });
        });

    }).catch(() => TheBarConfig.showError('recipes-container'));

})();
</script>

</body>
</html>
